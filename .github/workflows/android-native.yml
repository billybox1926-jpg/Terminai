name: TerminAI Android Native

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
  pull_request:
    branches:
      - main
    paths:
      - "android/**"

permissions:
  contents: read

concurrency:
  group: terminai-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android native host
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/gradle-wrapper.properties', 'android/**/build.gradle', 'android/**/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminai-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
