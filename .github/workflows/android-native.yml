name: TerminAI Android Native

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-native.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-native.yml"

permissions:
  contents: read

concurrency:
  group: terminai-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android native host
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Configure Android SDK
        shell: bash
        run: |
          set -euxo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"
          "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --version
          set +o pipefail
          yes | "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/gradle-wrapper.properties', 'android/**/build.gradle', 'android/**/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminai-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
