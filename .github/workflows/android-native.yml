name: TerminAI Android Native

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "runtime/**"
      - ".github/workflows/android-native.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/**"
      - "runtime/**"
      - ".github/workflows/android-native.yml"

permissions:
  contents: read

concurrency:
  group: terminai-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Lint, test, and build Android APKs
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Configure Android SDK
        shell: bash
        run: |
          set -euxo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"
          "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --version
          set +o pipefail
          yes | "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/gradle-wrapper.properties', 'android/**/*.gradle', 'android/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Run Android lint
        working-directory: android
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build unsigned release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminai-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload unsigned release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminai-android-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminai-android-reports
          path: |
            android/app/build/reports/
            android/app/build/test-results/
          if-no-files-found: ignore
