name: Android APK Install Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terminai-android-install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-smoke:
    name: Build, install, and launch debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Android SDK
        shell: bash
        run: |
          set -euxo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"
          "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --version
          set +o pipefail
          yes | "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          set -o pipefail
          "${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/gradle-wrapper.properties', 'android/**/*.gradle', 'android/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run emulator install smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            set -euxo pipefail
            adb devices
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.billybox.terminai/.MainActivity
            sleep 5
            adb shell pidof com.billybox.terminai

      - name: Capture logcat on failure
        if: failure()
        shell: bash
        run: adb logcat -d > logcat.txt || true

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-test-artifacts
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            logcat.txt
          if-no-files-found: warn
