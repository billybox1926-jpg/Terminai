name: TerminAI CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "index.html"
      - "server.ts"
      - "src/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: terminai-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
